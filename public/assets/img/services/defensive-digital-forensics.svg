    <path d="M44 246h272" stroke="#b9c7de" stroke-opacity=".22" stroke-width="12" stroke-linecap="round"/>
  </g>
  <g transform="translate(522 96)">
    <rect width="340" height="210" rx="20" fill="#101827" stroke="#2f6bff" stroke-opacity=".36"/>
    <path d="M36 46h104M36 84h186M36 124h146M36 164h226" stroke="#b9c7de" stroke-opacity=".34" stroke-width="12" stroke-linecap="round"/>
    <path d="M240 60h20M250 50v20" stroke="#22d3ee" stroke-width="6" stroke-linecap="round"/>
  </g>
  <g transform="translate(422 340)">
    <circle cx="84" cy="80" r="78" fill="#0c1322" stroke="#2f6bff" stroke-opacity=".45" stroke-width="4"/>
    <path d="M52 80c0-40 32-72 72-72s72 32 72 72-32 72-72 72-72-32-72-72Z" fill="#101827"/>
    <path d="M84 36v88M56 80h56" stroke="#2f6bff" stroke-width="8" stroke-linecap="round"/>
    <path d="M64 58c10-10 24-10 34 0M64 102c10 10 24 10 34 0" stroke="#22d3ee" stroke-width="5" stroke-linecap="round" opacity=".85"/>
  </g>
  <g transform="translate(158 382)">
    <rect width="260" height="82" rx="16" fill="#101827" stroke="#2f6bff" stroke-opacity=".24"/>
    <circle cx="38" cy="44" r="12" fill="#2f6bff"/>
