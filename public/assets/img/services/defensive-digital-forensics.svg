<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 600" role="img" aria-labelledby="title desc">
  <title id="title">Digital forensics visual</title>
  <desc id="desc">A digital forensics illustration with a fingerprint, evidence timeline, and incident response panels.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#050c17"/>
      <stop offset="1" stop-color="#101827"/>
    </linearGradient>
    <radialGradient id="halo" cx=".35" cy=".38" r=".55">
      <stop offset="0" stop-color="#2f6bff" stop-opacity=".45"/>
      <stop offset="1" stop-color="#2f6bff" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="grid" width="50" height="50" patternUnits="userSpaceOnUse">
      <path d="M50 0H0v50" fill="none" stroke="#ffffff" stroke-opacity=".03"/>
    </pattern>
  </defs>
  <rect width="960" height="600" rx="28" fill="url(#bg)"/>
  <rect width="960" height="600" rx="28" fill="url(#grid)"/>
  <rect width="960" height="600" rx="28" fill="url(#halo)"/>
  <g transform="translate(92 104)">
    <rect width="360" height="280" rx="22" fill="#0d1726" stroke="#2f6bff" stroke-opacity=".32"/>
    <rect x="28" y="34" width="304" height="180" rx="14" fill="#101827"/>
