<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 600" role="img" aria-labelledby="title desc">
  <title id="title">Threat intelligence visual</title>
  <desc id="desc">A defensive intelligence illustration with a globe, alert cards, and threat signal arcs.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#050c17"/>
      <stop offset="1" stop-color="#081a30"/>
    </linearGradient>
    <radialGradient id="signal" cx=".52" cy=".43" r=".58">
      <stop offset="0" stop-color="#2f6bff" stop-opacity=".48"/>
      <stop offset="1" stop-color="#2f6bff" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="grid" width="50" height="50" patternUnits="userSpaceOnUse">
      <path d="M50 0H0v50" fill="none" stroke="#ffffff" stroke-opacity=".04"/>
    </pattern>
  </defs>
  <rect width="960" height="600" rx="28" fill="url(#bg)"/>
  <rect width="960" height="600" rx="28" fill="url(#grid)"/>
  <rect width="960" height="600" rx="28" fill="url(#signal)"/>
  <g transform="translate(280 90)" filter="url(#glow)">
    <circle cx="200" cy="208" r="158" fill="#081a2d" stroke="#2f6bff" stroke-opacity=".6" stroke-width="3"/>
    <ellipse cx="200" cy="208" rx="64" ry="158" fill="none" stroke="#5ea8ff" stroke-opacity=".28" stroke-width="2"/>
    <ellipse cx="200" cy="208" rx="118" ry="158" fill="none" stroke="#5ea8ff" stroke-opacity=".18" stroke-width="2"/>
    <path d="M45 208h310M78 140c70 22 150 22 220 0M78 276c70-22 150-22 220 0" stroke="#5ea8ff" stroke-opacity=".3" stroke-width="2" fill="none"/>
    <path d="M154 118c46 10 80 38 98 82 12 24 26 38 54 42" fill="none" stroke="#22d3ee" stroke-width="4" stroke-linecap="round"/>
    <path d="M112 254c30-36 70-54 118-50" fill="none" stroke="#ff3151" stroke-width="4" stroke-linecap="round"/>
    <circle cx="245" cy="202" r="8" fill="#22d3ee"/>
    <circle cx="305" cy="250" r="8" fill="#ff3151"/>
    <circle cx="108" cy="250" r="8" fill="#ffb51b"/>
  </g>
  <g transform="translate(88 108)">
    <rect width="210" height="122" rx="16" fill="#101827" stroke="#2f6bff" stroke-opacity=".4"/>
    <path d="M32 42h92M32 78h154M32 114h114" stroke="#b9c7de" stroke-opacity=".44" stroke-width="10" stroke-linecap="round"/>
    <circle cx="174" cy="48" r="14" fill="#2f6bff" fill-opacity=".2" stroke="#2f6bff"/>
  </g>
  <g transform="translate(680 124)">
    <rect width="196" height="140" rx="18" fill="#101827" stroke="#2f6bff" stroke-opacity=".34"/>
    <path d="M32 46h96M32 82h138M32 118h94" stroke="#b9c7de" stroke-opacity=".34" stroke-width="10" stroke-linecap="round"/>
    <path d="M150 46l22 40h-44Z" fill="#2f6bff"/>
  </g>
  <g transform="translate(440 350)">
    <circle cx="40" cy="40" r="32" fill="#2f6bff" opacity=".24"/>
    <path d="M40 20v40M20 40h40" stroke="#ffffff" stroke-opacity=".16" stroke-width="6" stroke-linecap="round"/>
    <path d="M16 18c18-14 44-12 56 6" fill="none" stroke="#22d3ee" stroke-width="5" stroke-linecap="round"/>
  </g>
</svg>
