<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 600" role="img" aria-labelledby="title desc">
  <title id="title">Network security assessment visual</title>
  <desc id="desc">A network security illustration with connected nodes, firewall shields, and scanning beams.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#050c17"/>
      <stop offset="1" stop-color="#120a18"/>
    </linearGradient>
    <linearGradient id="scan" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ff3151" stop-opacity="0"/>
      <stop offset=".5" stop-color="#ff3151" stop-opacity=".7"/>
      <stop offset="1" stop-color="#ff3151" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="grid" width="56" height="56" patternUnits="userSpaceOnUse">
      <path d="M56 0H0v56" fill="none" stroke="#ffffff" stroke-opacity=".04"/>
    </pattern>
  </defs>
  <rect width="960" height="600" rx="28" fill="url(#bg)"/>
  <rect width="960" height="600" rx="28" fill="url(#grid)"/>
  <g transform="translate(88 110)">
    <path d="M120 96h208M328 96v132M120 96v132M120 224h208M328 224h184M512 224v112M512 336h178" fill="none" stroke="#7898c7" stroke-opacity=".34" stroke-width="4"/>
    <g fill="#0e1829" stroke="#2f6bff" stroke-opacity=".45" stroke-width="2">
      <rect x="40" y="46" width="160" height="100" rx="14"/>
      <rect x="248" y="46" width="160" height="100" rx="14"/>
      <rect x="40" y="172" width="160" height="100" rx="14"/>
      <rect x="248" y="172" width="160" height="100" rx="14"/>
      <rect x="432" y="172" width="160" height="100" rx="14"/>
      <rect x="610" y="280" width="160" height="100" rx="14"/>
    </g>
    <g stroke="#b9c7de" stroke-opacity=".3" stroke-width="8" stroke-linecap="round">
      <path d="M72 88h88M72 112h52M280 88h96M280 112h58M72 214h88M72 238h64M280 214h96M280 238h48M464 214h96M464 238h70M642 322h96M642 346h56"/>
    </g>
    <g fill="#ff3151" filter="url(#glow)">
      <circle cx="408" cy="96" r="9"/>
      <circle cx="592" cy="222" r="9"/>
      <circle cx="610" cy="330" r="9"/>
    </g>
  </g>
  <g transform="translate(476 66)">
    <path d="M64 0h128l64 54v220c0 78-56 140-128 160C56 420 0 348 0 270V54Z" fill="#101827" stroke="#ff3151" stroke-opacity=".46" stroke-width="3"/>
    <path d="M32 88h192M32 142h192M32 196h192M32 250h192" stroke="#ff3151" stroke-opacity=".36" stroke-width="16"/>
    <path d="M128 60v270" stroke="#ffb51b" stroke-width="4" stroke-dasharray="10 14" opacity=".75"/>
  </g>
  <rect x="0" y="286" width="960" height="42" fill="url(#scan)" opacity=".45" filter="url(#glow)"/>
  <path d="M104 468c182-56 366-48 556-12 84 16 142 17 204-10" fill="none" stroke="#ffb51b" stroke-width="4" stroke-dasharray="14 16" stroke-linecap="round" opacity=".74"/>
